{% extends "base.html" %}
{% block title %}Sign up &middot; CipherLab{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="rounded-2xl border border-white/10 bg-ink-800/60 backdrop-blur p-8 shadow-2xl">
    <h1 class="text-2xl font-semibold tracking-tight">Create your account</h1>
    <p class="text-slate-400 text-sm mt-1">Your activity history will be saved to your account.</p>

    <form method="post" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
        <input name="username" type="text" required autocomplete="username"
               class="w-full rounded-lg bg-ink-900/80 border border-white/10 px-3 py-2 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
        <input name="password" type="password" required autocomplete="new-password" minlength="6"
               class="w-full rounded-lg bg-ink-900/80 border border-white/10 px-3 py-2 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Confirm password</label>
        <input name="confirm" type="password" required autocomplete="new-password" minlength="6"
               class="w-full rounded-lg bg-ink-900/80 border border-white/10 px-3 py-2 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <button type="submit"
              class="w-full rounded-lg bg-brand-600 hover:bg-brand-500 transition py-2.5 font-medium">Create account</button>
    </form>

    <p class="text-sm text-slate-400 mt-6 text-center">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-brand-400 hover:text-brand-300">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
